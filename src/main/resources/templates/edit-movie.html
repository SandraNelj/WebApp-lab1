<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Movie</title>
</head>
<body>
<form th:action="@{/movies/update/{id}(id=${movie.id})}"
      th:object="${movie}"
      method="post">
    <label>Movie Title
    <input type="text" th:field="*{title}">
    </label>

    <label>Description
    <input type="text" th:field="*{description}">
    </label>

    <label>Release Date
    <input type="text" th:field="*{releaseDate}">
    </label>

    <label>Director
    <input type="text" th:field="*{director}">
    </label>

    <label>Duration
    <input type="text" th:field="*{durationMinutes}">
    </label>

    <button type="Submit">Update Movie</button>
</form>
</body>
</html>
