<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movies</title>
</head>
<body>
<h1>Movie List</h1>
<a th:href="@{/movies/new}">Add new Movie</a>
<table border="1">
    <tr>
        <th>Movie Title</th>
        <th>Director</th>
        <th>Release Date</th>
        <th>Duration (minutes)</th>
    </tr>
    <tr th:each="movie : ${movies}">
    <td th:text="${movie.title}">Title</td>
    <td th:text="${movie.director}">Director</td>
    <td th:text="${movie.releaseDate}">Date</td>
    <td th:text="${movie.durationMinutes}">Duration</td>
        <td>
            <a th:href="@{/movies/delete/{id}(id=${movie.id})}">Delete</a>
        </td>
    </tr>
</table>
</body>
</html>
