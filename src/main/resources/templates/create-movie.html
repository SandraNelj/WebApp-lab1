<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Movie</title>
</head>
<body>

<h1>Add Movie</h1>

<form th:action="@{/movies}" th:object="${movie}" method="post">
    <label for="title">Title</label>
    <input type="text" id="title" th:field="*{title}">
    <p style="color:red" th:if="${#fields.hasErrors('title')}"th:errors="*{title}"></p>

    <label for="description">Description</label>
    <input type="text" id="description" th:field="*{description}">
    <p style="color:red" th:if="${#fields.hasErrors('description')}"th:errors="*{description}"></p>

    <label for="releaseDate">Release Date</label>
    <input type="text" id="releaseDate" th:field="*{releaseDate}">
    <p style="color:red" th:if="${#fields.hasErrors('releaseDate')}" th:errors="*{releaseDate}"></p>

    <label for="director">Director</label>
    <input type="text" id="director" th:field="*{director}">
    <p style="color:red" th:if="${#fields.hasErrors('director')}" th:errors="*{director}"></p>

    <label for="durationMinutes">Duration</label>
    <input type="number" id="durationMinutes" th:field="*{durationMinutes}">
    <p style="color:red" th:if="${#fields.hasErrors('durationMinutes')}" th:errors="*{durationMinutes}"></p>

    <button type="submit">Save</button>
</form>
</body>
</html>
